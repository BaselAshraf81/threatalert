[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/get-user-id"
  to = "/.netlify/functions/get-user-id"
  status = 200
  force = true

[[redirects]]
  from = "/api/createIncident"
  to = "https://us-east1-threatalert-app-2026.cloudfunctions.net/createIncident"
  status = 200
  force = true

[[redirects]]
  from = "/api/vote"
  to = "https://us-east1-threatalert-app-2026.cloudfunctions.net/vote"
  status = 200
  force = true

[[redirects]]
  from = "/api/patchIncidentPhotos"
  to = "https://us-east1-threatalert-app-2026.cloudfunctions.net/patchIncidentPhotos"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "public, max-age=0, must-revalidate"